<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick
      // Saves the URL to sessionStorage and sends the user to the root index.html
      var base = '/houser-js-toolbox'
      var path = location.pathname.slice(base.length) || '/'
      var search = location.search
      var hash = location.hash
      sessionStorage.setItem('spa-redirect', path + search + hash)
      location.replace(base + '/')
    </script>
  </head>
</html>
